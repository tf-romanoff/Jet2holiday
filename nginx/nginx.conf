events {}
http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:4000;
    }

    server {
        listen 80;

        # /internal 외부 접근 차단
        location /internal {
            return 403 "Forbidden\n";
        }

        # VULNERABLE: CL.TE Smuggling
        # nginx는 Content-Length 기준, backend는 Transfer-Encoding 기준
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header Transfer-Encoding $http_transfer_encoding;
        }
    }
}