<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>구매 - Jet2Holiday</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div>✈️</div>
    <div>
      <h1>Jet2Holiday</h1>
      <span>Book your dream flight</span>
    </div>
  </header>
  <div class="container">
    <div class="card">
      <h2 style="margin-bottom:20px;">✈️ 항공권 구매</h2>
      <div class="flight-card">
        <div class="flight-info">
          <h2>Seoul → {{ flight.to }}</h2>
          <p>{{ flight.id }}</p>
        </div>
        <div style="text-align:right;">
          {% if coupon == 'HALF50' %}
            <div class="coupon-box">🎉 50% 할인 쿠폰 적용!</div>
            <div class="price-original">{{ flight.price }}원</div>
            <div class="price-discount">{{ flight.price // 2 }}원</div>
          {% else %}
            <div class="alert-error">❌ 쿠폰 없음</div>
            <div class="price">{{ flight.price }}원</div>
          {% endif %}
        </div>
      </div>
      <form action="/purchase" method="POST">
        <input type="hidden" name="coupon" value="{{ coupon }}">
        <button type="submit" class="btn" style="width:100%; padding:14px; font-size:1.1em;">
          💳 결제하기
        </button>
      </form>
    </div>
  </div>
</body>
</html>
