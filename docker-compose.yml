version: '3.8'

services:
  nginx:
    image: nginx:1.18
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - public_net
      - internal_net

  frontend:
    build: ./frontend
    networks:
      - public_net
      - internal_net
  
  backend:
    build: ./backend
    networks:
      - internal_net 

networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true